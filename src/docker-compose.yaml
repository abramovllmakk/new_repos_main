version: '3'
services:
  trudagolic.postgres:
    image: postgres:latest
    hostname: trudagolic.postgres
    container_name: trudagolic.postgres
    ports:
    - ${POSTGRES_PORT}:5432
    volumes:
    - pgdata:/var/lib/postgresql/data
    env_file:
    - ./.env
  trudagolic.redis:
    image: valkey/valkey:latest
    hostname: trudagolic.redis
    container_name: trudagolic.redis
    command: /bin/sh -c "redis-server --requirepass ${REDIS_PASSWORD}"
    ports:
    - ${REDIS_PORT}:6379
    volumes:
    - redis_data:/data
    env_file:
    - ./.env
  trudagolic.backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - ${APP_PORT}:8000
    env_file:
    - ./.env
volumes:
  pgdata:
  redis_data: